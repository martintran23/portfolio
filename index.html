<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin Tran | Pokémon Lab Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <div class="game-wrapper">
  <div class="game-container">
    <!-- Pokémon Lab room - Oak's lab background from FireRed/LeafGreen style -->
    <div class="lab-room" id="labRoom">
      <!-- All balls show pokeball closed; on interact: closed → ultraball → open, then popup -->
      <div class="pokeball pokeball-1" id="pokeball1" data-option="projects" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <div class="pokeball pokeball-2" id="pokeball2" data-option="experience" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <div class="pokeball pokeball-3" id="pokeball3" data-option="resume" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <!-- Player character (starts on red mat at bottom center) -->
      <div class="player" id="player">
        <div class="player-sprite"></div>
      </div>
    </div>

    <!-- Pokémon-style dialog box -->
    <div class="dialog-overlay" id="dialogOverlay" hidden>
      <div class="dialog-box">
        <p class="dialog-text" id="dialogText">Choose an option.</p>
        <div class="dialog-options">
          <button class="dialog-option option-primary" id="optionPrimary">Check Projects</button>
          <button class="dialog-option option-secondary" id="optionSecondary" hidden>Download Resume</button>
          <button class="dialog-option option-cancel" id="optionCancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Section panels (Projects, Experience, Resume) -->
    <div class="panel-overlay" id="panelOverlay" hidden>
      <div class="panel">
        <button class="panel-close" id="panelClose" aria-label="Close">×</button>
        <div class="panel-content" id="panelContent"></div>
      </div>
    </div>
  </div>
  </div>

  <!-- Hidden content for each section -->
  <template id="projectsContent">
    <h2>Projects</h2>
    <p>New projects coming soon!</p>
  </template>
  <template id="experienceContent">
    <h2>Work Experience</h2>

    <section>
      <h3>OpenQQuantify</h3>
      <p>Software Development Intern</p>
      <p class="date">May 2025 - October 2025</p>
      <ul class="xp-list">
        <li>Developed an AI health assistant chatbot using LLMs (Hugging Face) for semantic search and FAQ generation.</li>
        <li>Built a Python ETL pipeline to transform FDA drug data from nested JSON to clean, structured CSVs.</li>
        <li>Designed a responsive frontend (HTML/CSS/JS) featuring real-time chat UI and theme toggling to improve user accessibility and engagement.</li>
        <li>Automated 3D asset acquisition via public APIs with license filtering, converting assets to optimized glTF/GLB format and integrating into a Three.js interface for interactive visualization.</li>
      </ul>
    </section>

    <section>
      <h3>Product Manager Accelerator</h3>
      <p>AI Engineer</p>
      <p class="date">June 2025 - September 2025</p>
      <ul class="xp-list">
        <li>Designed and implemented the journal entries feature, creating MongoDB schemas, database models, and FastAPI endpoints to securely handle journaling data.</li>
        <li>Extended backend architecture to support chat history storage and future scalability.</li>
        <li>Collaborated on branch-based Git workflows, maintaining separate dev/testing branches and managing schema/database updates for new features.</li>
      </ul>
    </section>
  </template>
  <template id="resumeContent">
    <h2>Resume</h2>
    <p>You can view the full resume below, or download it directly from the dialog.</p>
    <iframe
      src="assets/resume.pdf"
      title="Martin Tran Resume"
      style="width: 100%; height: 360px; border: 0; background: #fff;">
    </iframe>
  </template>

  <p class="controls-hint">WASD to move · E to interact</p>

  <script src="game.js"></script>
</body>
</html>
