<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin Tran | Pokémon Lab Portfolio</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <div class="game-wrapper">
  <div class="game-container">
    <!-- Pokémon Lab room - Oak's lab background from FireRed/LeafGreen style -->
    <div class="lab-room" id="labRoom">
      <!-- All balls show pokeball closed; on interact: closed → ultraball → open, then popup -->
      <div class="pokeball pokeball-1" id="pokeball1" data-option="projects" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <div class="pokeball pokeball-2" id="pokeball2" data-option="experience" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <div class="pokeball pokeball-3" id="pokeball3" data-option="resume" title="Press E when close">
      <img class="pokeball-img pokeball-img--f1" src="assets/pokeball-closed.png" alt="">
      <img class="pokeball-img pokeball-img--f2" src="assets/pokeball-semiopen.png" alt="">
      <img class="pokeball-img pokeball-img--f3" src="assets/pokeball-open.png" alt="">
      </div>
      <!-- Player character (starts on red mat at bottom center) -->
      <div class="player" id="player">
        <div class="player-sprite"></div>
      </div>
    </div>

    <!-- Pokémon-style dialog box -->
    <div class="dialog-overlay" id="dialogOverlay" hidden>
      <div class="dialog-box">
        <p class="dialog-text" id="dialogText">Choose an option.</p>
        <div class="dialog-options">
          <button class="dialog-option option-primary" id="optionPrimary">Check Projects</button>
          <button class="dialog-option option-secondary" id="optionSecondary" hidden>Download Resume</button>
          <button class="dialog-option option-cancel" id="optionCancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Section panels (Projects, Experience, Resume) -->
    <div class="panel-overlay" id="panelOverlay" hidden>
      <div class="panel">
        <button class="panel-close" id="panelClose" aria-label="Close">×</button>
        <div class="panel-content" id="panelContent"></div>
      </div>
    </div>
  </div>
  </div>

  <!-- Hidden content for each section -->
  <template id="projectsContent">
    <h2>Projects</h2>
    <p>Your projects will go here. Add links and descriptions from your V1 reference when ready.</p>
  </template>
  <template id="experienceContent">
    <h2>Work Experience</h2>
    <p>Your experience will go here. Add roles and details from your V1 reference when ready.</p>
  </template>
  <template id="resumeContent">
    <h2>Resume</h2>
    <p>You can view the full resume below, or download it directly from the dialog.</p>
    <iframe
      src="assets/resume.pdf"
      title="Martin Tran Resume"
      style="width: 100%; height: 360px; border: 0; background: #fff;">
    </iframe>
  </template>

  <p class="controls-hint">WASD to move · E to interact with a Poké Ball</p>

  <script src="game.js"></script>
</body>
</html>
